name: Run Arxiv Papers Daily QA

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0/12 * * *"

env:
  GITHUB_USER_NAME: HoBeom
  GITHUB_USER_EMAIL: jhb1365@gmail.com

jobs:
  build:
    name: update
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python Env
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run QA
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python daily_qa.py

      - name: Push new QA data
        uses: github-actions-x/commit@v2.9
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "Github Action Automatic QA Arxiv Papers"
          rebase: 'true'
          files: arxiv/action-recognition/qa.json arxiv/human-pose-estimation/qa.json arxiv/tom-agent/qa.json
          name: ${{ env.GITHUB_USER_NAME }}
          email: ${{ env.GITHUB_USER_EMAIL }}
