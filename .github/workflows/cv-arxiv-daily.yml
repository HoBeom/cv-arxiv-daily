name: Run Arxiv Papers Daily

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0/12 * * *"

env:
  GITHUB_USER_NAME: HoBeom
  GITHUB_USER_EMAIL: jhb1365@gmail.com

jobs:
  build:
    name: update
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python Env
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Debug arxiv version
        run: |
          python -c "import arxiv; print('arxiv version:', getattr(arxiv, '__version__', 'unknown'))"

      - name: Run daily arxiv
        run: |
          python daily_arxiv.py

      - name: Push new cv-arxiv-daily.md
        uses: github-actions-x/commit@v2.9
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "Github Action Automatic Update Arxiv Papers"
          rebase: 'true'
          name: ${{ env.GITHUB_USER_NAME }}
          email: ${{ env.GITHUB_USER_EMAIL }}
